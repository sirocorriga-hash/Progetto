<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="History of Cagliari Calcio 1970 championship season">
  <title>Cagliari FC 1970</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="CSS/style.css">
</head>

<body class="bg-light d-flex flex-column min-vh-300">

  <!-- Header -->
  <header>
    <div class="header-content d-flex justify-content-between align-items-center p-3">
      <a href="index.html">
        <img src="immagini/Immagine-0.png" alt="Cagliari logo" class="logo">
      </a>

      <nav aria-label="Main navigation">
        <ul class="list-unstyled d-flex gap-3 m-0">
          <li><a href="index.html">Home</a></li>
          <li><a href="history.html">The History</a></li>
          <li><a href="team.html">The Team</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="container py-5 flex-grow-1">
    <form method="post"
          action="#"
          class="p-4 border rounded bg-white mx-auto form-container">

      <fieldset>
        <legend class="mb-3">Contact Information</legend>

        <!-- Full Name -->
        <div class="mb-3">
          <label for="name" class="form-label">Full Name</label>
          <input type="text"
                 id="name"
                 name="name"
                 class="form-control"
                 required
                 minlength="2"
                 maxlength="50"
                 aria-describedby="nameHelp">
          <div id="nameHelp" class="form-text">
            Please enter your full name.
          </div>
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <input type="email"
                 id="email"
                 name="email"
                 class="form-control"
                 required
                 aria-describedby="emailHelp">
          <div id="emailHelp" class="form-text">
            We will never share your email.
          </div>
        </div>

        <!-- Subject -->
        <div class="mb-3">
          <label for="subject" class="form-label">Subject</label>
          <input type="text"
                 id="subject"
                 name="subject"
                 class="form-control"
                 required
                 pattern="[A-Za-z ]+"
                 title="Letters only"
                 aria-describedby="subjectHelp">
          <div id="subjectHelp" class="form-text">
            Letters and spaces only.
          </div>
        </div>

        <!-- Message -->
        <div class="mb-3">
          <label for="message" class="form-label">Message</label>
          <textarea id="message"
                    name="message"
                    rows="5"
                    class="form-control"
                    required
                    minlength="10"
                    maxlength="500"
                    aria-describedby="messageHelp"></textarea>
          <div id="messageHelp" class="form-text">
            Minimum 10 characters.
          </div>
        </div>
      </fieldset>

      <button type="submit" class="btn btn-primary">Submit</button>
    </form>
  </main>

  <!-- Footer -->
  <footer class="text-center mt-auto py-3">
    <img src="immagini/Immagine-0.png"
         loading="lazy"
         alt="Cagliari logo"
         width="40"
         height="40">
    <p class="mt-2 mb-0">
      © 2026 Cagliari Calcio Football Club. All rights reserved.
    </p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
